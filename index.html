<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIを、自分の「分身」にする働き方</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        
        /* スライドの切り替えアニメーション */
        .slide { display: none; min-height: 100dvh; padding-top: 80px; padding-bottom: 120px; }
        .slide.active { display: flex; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 重なり防止：メインコンテンツのスクロール許可 */
        main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">

    <div class="fixed inset-0 flex flex-col overflow-hidden">
        <header class="shrink-0 w-full p-6 flex justify-between items-center z-20 text-zinc-400 text-xs md:text-sm font-medium tracking-widest bg-zinc-50/80 backdrop-blur-sm">
            <span>AI DESIGN</span>
            <span id="slideNumber">1 / 8</span>
        </header>

        <main id="main-container" class="relative">
            
            <div class="slide active flex-col items-center justify-center text-center space-y-8 px-6 max-w-4xl mx-auto" data-index="0">
                <h1 class="text-3xl md:text-6xl font-bold tracking-tight text-zinc-900 leading-tight">
                    AIを、自分の<br class="md:hidden" />「分身」にする働き方
                </h1>
                <p class="text-lg md:text-2xl text-zinc-600 leading-relaxed max-w-3xl">
                    あなたが動き続けなくても、ビジネスが整っていく状態を作る。<br />
                    それが、AIを分身にするということです。
                </p>
            </div>

            <div class="slide flex-col justify-center px-6 max-w-4xl mx-auto w-full" data-index="1">
                <h2 class="text-2xl md:text-4xl font-bold text-zinc-900 mb-8 text-center">こんな状態になっていませんか？</h2>
                <div class="bg-white rounded-3xl p-6 md:p-10 border border-zinc-200 shadow-sm space-y-6">
                    <div class="flex items-start"><i data-lucide="check-circle" class="shrink-0 w-6 h-6 md:w-8 md:h-8 mr-4 text-zinc-400"></i><p class="text-lg md:text-2xl text-zinc-700">発信を止めると、自分の存在感まで消えてしまう気がする</p></div>
                    <div class="flex items-start"><i data-lucide="check-circle" class="shrink-0 w-6 h-6 md:w-8 md:h-8 mr-4 text-zinc-400"></i><p class="text-lg md:text-2xl text-zinc-700">日々寄せられる、同じような問い合わせの対応に追われている</p></div>
                    <div class="flex items-start"><i data-lucide="check-circle" class="shrink-0 w-6 h-6 md:w-8 md:h-8 mr-4 text-zinc-400"></i><p class="text-lg md:text-2xl text-zinc-700">サービスの価値を伝えるために、毎回同じ説明を繰り返している</p></div>
                    <div class="mt-10 pt-8 border-t border-zinc-200 text-center">
                        <p class="text-xl md:text-2xl text-zinc-900 font-medium">「もう一人自分がいたら」と思いながら、すべてをひとりで抱え込んでいませんか？</p>
                    </div>
                </div>
            </div>

            <div
